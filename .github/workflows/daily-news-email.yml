name: Send Daily c-owl News Email

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          python3 scripts/send_email.py news "[c-owl] 外国人材ニュース" "$TODAY"
